name: PetLifeCompanion
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.shimizutaiga.PetLifeCompanion
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_LANGUAGE: ja
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
    INFOPLIST_KEY_CFBundleDevelopmentRegion: ja_JP
    INFOPLIST_KEY_CFBundleLocalizations:
      - ja
      - en
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  PetLifeCompanion:
    type: application
    platform: iOS
    sources:
      - path: PetLifeCompanion
    settings:
      base:
        PRODUCT_NAME: PetLifeCompanion
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: うちの子日記
        INFOPLIST_KEY_UIRequiresFullScreen: NO
    scheme:
      testTargets:
        - PetLifeCompanionTests
        - PetLifeCompanionUITests
  PetLifeCompanionTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: PetLifeCompanion
    sources:
      - path: PetLifeCompanionTests
    dependencies:
      - target: PetLifeCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimizutaiga.PetLifeCompanionTests
  PetLifeCompanionUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetLifeCompanionUITests
    dependencies:
      - target: PetLifeCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimizutaiga.PetLifeCompanionUITests
